function CanvasView({workspace,onUpdateWS,onEditMenu,projects}){
  const[pan,setPan]=useState({x:0,y:0});
  const[zoom,setZoom]=useState(1);
  const[connecting,setConnecting]=useState(null);
  const[mousePos,setMousePos]=useState({x:0,y:0});
  const[grabbing,setGrabbing]=useState(false);
  const[mmCtx,setMmCtx]=useState(null);
  const surfRef=useRef(null);

  const onBgDown=e=>{
    if(e.target.closest(".mm")||e.target.closest(".canvas-tb")||e.target.closest(".ctx"))return;
    if(e.button!==0)return;
    if(connecting){setConnecting(null);return;}
    setGrabbing(true);
    const sx=e.clientX-pan.x,sy=e.clientY-pan.y;
    const mv=ev=>setPan({x:ev.clientX-sx,y:ev.clientY-sy});
    const up=()=>{setGrabbing(false);window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
  };

  const onWheel=e=>{
    e.preventDefault();
    const rect=surfRef.current.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const d=e.deltaY>0?0.9:1.1;
    const nz=Math.max(0.2,Math.min(3,zoom*d));
    setPan({x:mx-(mx-pan.x)*nz/zoom,y:my-(my-pan.y)*nz/zoom});
    setZoom(nz);
  };

  const moveMenu=(idx,nx,ny)=>{
    const ws={...workspace,menus:workspace.menus.map((m,i)=>i===idx?{...m,x:Math.round((nx-pan.x)/zoom),y:Math.round((ny-pan.y)/zoom)}:m)};
    onUpdateWS(ws);
  };

  const onSlotClick=(menuId,slot)=>{
    if(!connecting){setConnecting({menuId,slot});}
    else{
      if(connecting.menuId===menuId)return;
      const ws={...workspace,connections:[...workspace.connections,{id:gid(),fromMenu:connecting.menuId,fromSlot:connecting.slot,toMenu:menuId}]};
      onUpdateWS(ws);setConnecting(null);
    }
  };

  const delConn=id=>{onUpdateWS({...workspace,connections:workspace.connections.filter(c=>c.id!==id)});};

  const addExisting=id=>{
    if(workspace.menus.find(m=>m.projectId===id))return;
    onUpdateWS({...workspace,menus:[...workspace.menus,{projectId:id,x:200+workspace.menus.length*60,y:200+workspace.menus.length*40}]});
  };
  const addNew=()=>{
    const p=newProj("Меню "+(workspace.menus.length+1),3);saveProj(p);
    onUpdateWS({...workspace,menus:[...workspace.menus,{projectId:p.id,x:200+workspace.menus.length*60,y:200+workspace.menus.length*40}]});
  };
  const removeFromCanvas=idx=>{
    const pid=workspace.menus[idx].projectId;
    onUpdateWS({...workspace,menus:workspace.menus.filter((_,i)=>i!==idx),connections:workspace.connections.filter(c=>c.fromMenu!==pid&&c.toMenu!==pid)});
  };

  const getSlotCenter=(menuId,slot)=>{
    const mi=workspace.menus.findIndex(m=>m.projectId===menuId);if(mi<0)return null;
    const m=workspace.menus[mi];const[r,c]=slot.split("-").map(Number);
    return{x:m.x+3+c*21+10,y:m.y+28+r*21+10};
  };
  const getMenuTop=menuId=>{
    const mi=workspace.menus.findIndex(m=>m.projectId===menuId);if(mi<0)return null;
    const m=workspace.menus[mi];const p=projects[m.projectId];
    return{x:m.x+(3+9*21)/2,y:m.y};
  };

  return(<div className={"canvas-wrap"+(grabbing?" grabbing":"")} onMouseDown={onBgDown} onWheel={onWheel}
    onMouseMove={e=>setMousePos({x:(e.clientX-pan.x)/zoom,y:(e.clientY-pan.y)/zoom})} ref={surfRef}
    onKeyDown={e=>{if(e.key==="Escape")setConnecting(null);}} tabIndex={0}>
    <div className="canvas-grid-bg" style={{backgroundPosition:`${pan.x}px ${pan.y}px`,backgroundSize:`${40*zoom}px ${40*zoom}px`}}/>
    <div className="canvas-surf" style={{transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`}}>
      <svg style={{position:"absolute",top:0,left:0,width:1,height:1,overflow:"visible",pointerEvents:"none",zIndex:5}}>
        <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--ac)"/></marker></defs>
        {workspace.connections.map(c=>{
          const from=getSlotCenter(c.fromMenu,c.fromSlot);const to=getMenuTop(c.toMenu);
          if(!from||!to)return null;
          const dx=to.x-from.x,dy=to.y-from.y;
          return<g key={c.id} style={{pointerEvents:"auto"}}>
            <path className="conn-line" d={`M${from.x},${from.y} C${from.x},${from.y+dy*0.5} ${to.x},${to.y-Math.abs(dy)*0.3} ${to.x},${to.y}`}/>
            <circle cx={(from.x+to.x)/2} cy={(from.y+to.y)/2} r={7} fill="var(--srf)" stroke="var(--er)" strokeWidth={1.5} style={{cursor:"pointer",opacity:0}} onClick={()=>delConn(c.id)}
              onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0}/>
            <text x={(from.x+to.x)/2} y={(from.y+to.y)/2+3} textAnchor="middle" fontSize="9" fill="var(--er)" style={{pointerEvents:"none",opacity:0}} className="conn-del-txt">{"✕"}</text>
          </g>;
        })}
        {connecting&&getSlotCenter(connecting.menuId,connecting.slot)&&
          <line x1={getSlotCenter(connecting.menuId,connecting.slot).x} y1={getSlotCenter(connecting.menuId,connecting.slot).y}
            x2={mousePos.x} y2={mousePos.y} stroke="var(--ac)" strokeWidth={2} strokeDasharray="6,4" style={{pointerEvents:"none"}}/>}
      </svg>
      {workspace.menus.map((m,i)=>{
        const p=projects[m.projectId];if(!p)return null;
        return<MiniMenu key={m.projectId} project={p} x={m.x} y={m.y}
          onDrag={(nx,ny)=>moveMenu(i,nx,ny)} onDblClick={()=>onEditMenu(m.projectId)}
          onSlotClick={onSlotClick} connectingFrom={connecting}
          onCtxMenu={(cx,cy)=>setMmCtx({x:(cx-pan.x)/zoom,y:(cy-pan.y)/zoom,idx:i})}/>;
      })}
      {mmCtx&&<CtxMenu x={mmCtx.x} y={mmCtx.y} onClose={()=>setMmCtx(null)} items={[
        {l:"Редактировать",fn:()=>onEditMenu(workspace.menus[mmCtx.idx].projectId)},
        {sep:true},
        {l:"Убрать с canvas",d:true,fn:()=>removeFromCanvas(mmCtx.idx)},
      ]}/>}
    </div>
    <div className="canvas-tb">
      <input value={workspace.name} onChange={e=>onUpdateWS({...workspace,name:e.target.value})} className="pn" style={{background:"var(--pan)",border:"1px solid var(--bd)",borderRadius:"var(--r8)",padding:"4px 8px",color:"var(--tx1)",fontSize:12,width:160,textAlign:"center"}}/>
      <button className="b" onClick={addNew}>{"+ Новое"}</button>
      <select onChange={e=>{if(e.target.value)addExisting(e.target.value);e.target.value="";}} style={{fontSize:11,padding:"4px 6px",background:"var(--pan)",border:"1px solid var(--bd)",color:"var(--tx1)",borderRadius:4}}>
        <option value="">{"+ Существующее..."}</option>
        {loadProjList().filter(id=>!workspace.menus.find(m=>m.projectId===id)).map(id=>{const p=loadProj(id);return p?<option key={id} value={id}>{p.name}</option>:null;})}
      </select>
      <span style={{fontSize:10,color:"var(--tx3)"}}>{Math.round(zoom*100)}%</span>
    </div>
    {connecting&&<div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",background:"var(--ac)",color:"#0f0f11",padding:"4px 12px",borderRadius:"var(--r8)",fontSize:11,fontWeight:600,zIndex:10}}>
      {"Кликните по целевому меню · Esc — отмена"}
    </div>}
  </div>);
}

function App(){
  const prefs=loadPrefs();
  const initP=(()=>{if(prefs.lastOpenProject){const p=loadProj(prefs.lastOpenProject);if(p)return p;}const l=loadProjList();if(l.length){const p=loadProj(l[l.length-1]);if(p)return p;}return newProj();})();
  const[state,dispatch]=useReducer(reducer,{past:[],present:initP,future:[]});
  const proj=state.present;
  const[selSlot,setSelSlot]=useState(null);
  const[multiSel,setMultiSel]=useState(new Set());
  const[palItem,setPalItem]=useState(null);
  const[palPreset,setPalPreset]=useState(null);
  const[showExport,setShowExport]=useState(false);
  const[showGrad,setShowGrad]=useState(false);
  const[showColorPicker,setShowColorPicker]=useState(false);
  const[mode,setMode]=useState("editor");
  const[activeWS,setActiveWS]=useState(null);
  const[projectCache,setProjectCache]=useState({});
  const refreshProjectCache=ws=>{if(!ws)return;const c={};for(const m of ws.menus){const p=loadProj(m.projectId);if(p)c[m.projectId]=p;}setProjectCache(c);};
  const openCanvas=ws=>{setActiveWS(ws);refreshProjectCache(ws);setMode("canvas");};
  const updateWS=ws=>{setActiveWS(ws);saveWS(ws);refreshProjectCache(ws);};
  const editMenuFromCanvas=pid=>{const p=loadProj(pid);if(p){saveProj(proj);dispatch({type:'LP',project:p});setSelSlot(null);setMultiSel(new Set());setMode("editor");}};
  useEffect(()=>{if(mode==="canvas"&&activeWS){saveProj(proj);refreshProjectCache(activeWS);}},[mode]);
  const[showTpls,setShowTpls]=useState(false);
  const[showProjs,setShowProjs]=useState(false);
  const[showNums,setShowNums]=useState(false);
  const[ctxMenu,setCtxMenu]=useState(null);
  const[saveStatus,setSaveStatus]=useState("Saved");
  const[uTpls,setUTpls]=useState(loadUTpls());
  const[recent,setRecent]=useState([]);
  const[clipboard,setClipboard]=useState(null);
  const[htt,setHTT]=useState(null);
  const lastClick=useRef(null);
  const saveT=useRef(null);
  const painting=useRef(false);
  const rmbDown=useRef(false);
  const rmbDragged=useRef(false);
  const rmbWasDragged=useRef(false);
  const rmbStart=useRef(null);
  const[,forceRender]=useState(0);
  useEffect(()=>{window._forceUpdate=()=>forceRender(n=>n+1);return()=>{window._forceUpdate=null;};},[]);

  useEffect(()=>{const h=e=>{if(htt)setHTT(prev=>prev?{...prev,x:e.clientX,y:e.clientY}:null);};window.addEventListener("mousemove",h);return()=>window.removeEventListener("mousemove",h);},[htt]);
  useEffect(()=>{const h=()=>{painting.current=false;rmbWasDragged.current=rmbDragged.current;rmbDown.current=false;rmbDragged.current=false;rmbStart.current=null;};window.addEventListener("mouseup",h);return()=>window.removeEventListener("mouseup",h);},[]);
  useEffect(()=>{setSaveStatus("...");clearTimeout(saveT.current);saveT.current=setTimeout(()=>{saveProj(proj);savePrefs({...loadPrefs(),lastOpenProject:proj.id});setSaveStatus("Saved");},1000);return()=>clearTimeout(saveT.current);},[proj]);
  useEffect(()=>{const h=()=>saveProj(proj);window.addEventListener("beforeunload",h);return()=>window.removeEventListener("beforeunload",h);},[proj]);

  useEffect(()=>{const h=e=>{
    if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
    if(e.ctrlKey&&e.key==="z"){e.preventDefault();dispatch({type:'UNDO'});}
    if(e.ctrlKey&&(e.key==="y"||(e.shiftKey&&e.key==="Z"))){e.preventDefault();dispatch({type:'REDO'});}
    if(e.ctrlKey&&e.key==="e"){e.preventDefault();setShowExport(true);}
    if(e.ctrlKey&&e.key==="s"){e.preventDefault();saveProj(proj);setSaveStatus("Saved");}
    if(e.key==="Escape"){setSelSlot(null);setMultiSel(new Set());setCtxMenu(null);setShowExport(false);setShowTpls(false);setShowProjs(false);setPalItem(null);}
    if(e.key==="Delete"||e.key==="Backspace"){if(multiSel.size>0){e.preventDefault();dispatch({type:'RM',keys:[...multiSel]});setMultiSel(new Set());setSelSlot(null);}else if(selSlot&&proj.slots[selSlot]){e.preventDefault();dispatch({type:'RS',key:selSlot});}}
    if(e.ctrlKey&&e.key==="c"){if(multiSel.size>0){e.preventDefault();const d={};for(const k of multiSel)if(proj.slots[k])d[k]=JSON.parse(JSON.stringify(proj.slots[k]));setClipboard({m:true,d,k:[...multiSel]});}else if(selSlot&&proj.slots[selSlot]){e.preventDefault();setClipboard({m:false,d:JSON.parse(JSON.stringify(proj.slots[selSlot]))});}}
    if(e.ctrlKey&&e.key==="v"&&clipboard&&selSlot){e.preventDefault();if(clipboard.m){const ks=clipboard.k;if(!ks.length)return;const[br,bc]=ks[0].split("-").map(Number);const[sr,sc]=selSlot.split("-").map(Number);const dr=sr-br,dc=sc-bc;const slots={};for(const k of ks){if(!clipboard.d[k])continue;const[r,c]=k.split("-").map(Number);const nk=`${r+dr}-${c+dc}`;if(r+dr>=0&&r+dr<proj.rows&&c+dc>=0&&c+dc<9)slots[nk]=JSON.parse(JSON.stringify(clipboard.d[k]));}dispatch({type:'SM',slots});}else dispatch({type:'SS',key:selSlot,data:JSON.parse(JSON.stringify(clipboard.d))});}
    if(selSlot&&["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){e.preventDefault();const[r,c]=selSlot.split("-").map(Number);let nr=r,nc=c;if(e.key==="ArrowUp")nr=Math.max(0,r-1);if(e.key==="ArrowDown")nr=Math.min(proj.rows-1,r+1);if(e.key==="ArrowLeft")nc=Math.max(0,c-1);if(e.key==="ArrowRight")nc=Math.min(8,c+1);const nk=`${nr}-${nc}`;if(e.shiftKey)setMultiSel(prev=>{const n=new Set(prev);n.add(nk);return n;});else setMultiSel(new Set());setSelSlot(nk);}
    if(e.ctrlKey&&e.key==="a"){e.preventDefault();const all=new Set();for(let r=0;r<proj.rows;r++)for(let c=0;c<9;c++)all.add(`${r}-${c}`);setMultiSel(all);}
    if(e.ctrlKey&&e.key==="d"){e.preventDefault();if(selSlot&&proj.slots[selSlot]){const[r,c]=selSlot.split("-").map(Number);for(let nc=c+1;nc<9;nc++){const nk=r+"-"+nc;if(!proj.slots[nk]){dispatch({type:'SS',key:nk,data:JSON.parse(JSON.stringify(proj.slots[selSlot]))});setSelSlot(nk);break;}}}}
  };window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[selSlot,proj,clipboard,multiSel]);

  const onSlotMD=(e,key)=>{
    // Middle click = eyedropper
    if(e.button===1){e.preventDefault();const d=proj.slots[key];if(d){setPalItem(d.itemId);setPalPreset({displayName:JSON.parse(JSON.stringify(d.displayName)),lore:JSON.parse(JSON.stringify(d.lore)),enchanted:d.enchanted,amount:d.amount,customModelData:d.customModelData,hideFlags:d.hideFlags,potionColor:d.potionColor||null,skullTexture:d.skullTexture||null});setRecent(prev=>[d.itemId,...prev.filter(x=>x!==d.itemId)].slice(0,8));}else{setPalItem(null);setPalPreset(null);}return;}
    // RMB hold = brush (with item) or multi-select (without item)
    if(e.button===2){rmbDown.current=true;rmbDragged.current=false;rmbStart.current=key;lastClick.current=key;
      if(!palItem){setMultiSel(prev=>{const n=new Set(prev);n.add(key);return n;});setSelSlot(key);}
      return;}
    if(e.button!==0)return;setHTT(null);
    // Eraser mode
    if(palItem===ERASER_ID){if(multiSel.size>0){const ks=[...multiSel];if(!ks.includes(key))ks.push(key);dispatch({type:'RM',keys:ks.filter(k=>proj.slots[k])});setMultiSel(new Set());setSelSlot(null);}else if(proj.slots[key]){dispatch({type:'RS',key});}lastClick.current=key;return;}
    // Alt+Click = brush mode
    if(e.altKey&&palItem&&palItem!==ERASER_ID){e.preventDefault();painting.current=true;dispatch({type:'SS',key,data:makeSlot(palItem,palPreset)});setRecent(prev=>[palItem,...prev.filter(x=>x!==palItem)].slice(0,8));return;}
    if(e.altKey&&palItem===ERASER_ID){e.preventDefault();painting.current=true;if(proj.slots[key])dispatch({type:'RS',key});return;}
    if(e.ctrlKey){setMultiSel(prev=>{const n=new Set(prev);if(n.has(key))n.delete(key);else n.add(key);return n;});setSelSlot(key);lastClick.current=key;if(palItem&&!multiSel.has(key)){dispatch({type:'SS',key,data:makeSlot(palItem,palPreset)});setRecent(prev=>[palItem,...prev.filter(x=>x!==palItem)].slice(0,8));}return;}
    if(e.shiftKey&&lastClick.current){const[r1,c1]=lastClick.current.split("-").map(Number);const[r2,c2]=key.split("-").map(Number);const n=new Set(multiSel);for(let r=Math.min(r1,r2);r<=Math.max(r1,r2);r++)for(let c=Math.min(c1,c2);c<=Math.max(c1,c2);c++)n.add(`${r}-${c}`);setMultiSel(n);setSelSlot(key);return;}
    if(palItem){if(multiSel.size>1){const slots={};for(const k of multiSel)slots[k]=makeSlot(palItem,palPreset);slots[key]=makeSlot(palItem,palPreset);dispatch({type:'SM',slots});setRecent(prev=>[palItem,...prev.filter(x=>x!==palItem)].slice(0,8));setMultiSel(new Set());setSelSlot(key);}else{dispatch({type:'SS',key,data:makeSlot(palItem,palPreset)});setRecent(prev=>[palItem,...prev.filter(x=>x!==palItem)].slice(0,8));setSelSlot(key);setMultiSel(new Set());}}
    else{setSelSlot(key===selSlot?null:key);setMultiSel(new Set());}lastClick.current=key;};

  const onSlotCtx=(e,key)=>{e.preventDefault();
    if(rmbDragged.current||rmbWasDragged.current){rmbDown.current=false;rmbDragged.current=false;rmbStart.current=null;rmbWasDragged.current=false;return;}
    rmbWasDragged.current=false;
    rmbDown.current=false;rmbStart.current=null;
    setHTT(null);const items=[];
    if(proj.slots[key]){items.push({l:"Редактировать",fn:()=>{setSelSlot(key);setMultiSel(new Set());}});items.push({l:"Копировать",fn:()=>setClipboard({m:false,d:JSON.parse(JSON.stringify(proj.slots[key]))})});}
    if(clipboard)items.push({l:"Вставить",fn:()=>dispatch({type:'SS',key,data:JSON.parse(JSON.stringify(clipboard.m?Object.values(clipboard.d)[0]:clipboard.d))})});
    if(palItem){items.push({sep:true});if(multiSel.size>0)items.push({l:`Fill ${multiSel.size} sel`,fn:()=>{const slots={};for(const k of multiSel)slots[k]=makeSlot(palItem,palPreset);dispatch({type:'SM',slots});setMultiSel(new Set());}});items.push({l:"Залить пустые",fn:()=>dispatch({type:'FE',data:makeSlot(palItem,palPreset)})});}
    if(proj.slots[key]){items.push({sep:true});items.push({l:"Удалить",d:true,fn:()=>{dispatch({type:'RS',key});if(selSlot===key)setSelSlot(null);}});}
    if(multiSel.size>0){items.push({sep:true});items.push({l:`Remove ${multiSel.size} sel`,d:true,fn:()=>{dispatch({type:'RM',keys:[...multiSel]});setMultiSel(new Set());setSelSlot(null);}});}
    const[r]=key.split("-").map(Number);items.push({sep:true});items.push({l:"Очистить ряд",d:true,fn:()=>{const ks=[];for(let c=0;c<9;c++)ks.push(`${r}-${c}`);dispatch({type:'RM',keys:ks});}});
    if(items.length)setCtxMenu({x:e.clientX,y:e.clientY,items});};

  const applyTpl=t=>{const np=newProj(t.name||proj.name,t.rows);np.slots=JSON.parse(JSON.stringify(t.slots||{}));dispatch({type:'LP',project:np});setSelSlot(null);setMultiSel(new Set());setShowTpls(false);};
  const saveTpl=()=>{const name=prompt("Название шаблона:",proj.name);if(!name)return;const desc=prompt("Описание:","");const tpl={name,desc:desc||"",rows:proj.rows,slots:JSON.parse(JSON.stringify(proj.slots))};const upd=[...uTpls,tpl];setUTpls(upd);saveUTpls(upd);};
  const delTpl=i=>{const upd=uTpls.filter((_,j)=>j!==i);setUTpls(upd);saveUTpls(upd);};
  const fillSel=()=>{if(!palItem||multiSel.size===0)return;const slots={};for(const k of multiSel)slots[k]=makeSlot(palItem,palPreset);dispatch({type:'SM',slots});setRecent(prev=>[palItem,...prev.filter(x=>x!==palItem)].slice(0,8));};
  const onPaint=(key)=>{
    if(painting.current&&palItem){if(palItem===ERASER_ID){if(proj.slots[key])dispatch({type:'RS',key});}else{dispatch({type:'SS',key,data:makeSlot(palItem,palPreset)});}return;}
    if(rmbDown.current&&key!==rmbStart.current){
      if(!rmbDragged.current&&palItem&&palItem!==ERASER_ID&&rmbStart.current){dispatch({type:'SS',key:rmbStart.current,data:makeSlot(palItem,palPreset)});}
      if(!rmbDragged.current&&palItem===ERASER_ID&&rmbStart.current&&proj.slots[rmbStart.current]){dispatch({type:'RS',key:rmbStart.current});}
      rmbDragged.current=true;
      if(palItem===ERASER_ID){if(proj.slots[key])dispatch({type:'RS',key});}
      else if(palItem){dispatch({type:'SS',key,data:makeSlot(palItem,palPreset)});setRecent(prev=>[palItem,...prev.filter(x=>x!==palItem)].slice(0,8));}
      else{setMultiSel(prev=>{const n=new Set(prev);n.add(key);return n;});setSelSlot(key);}
    }
  };

  const[showMenu,setShowMenu]=useState(false);
  const menuRef=useRef(null);
  useEffect(()=>{if(!showMenu)return;const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setShowMenu(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[showMenu]);

  return(<div className="app">
    <div className="tb">
      <div className="tg"><input className="pn" value={proj.name} onChange={e=>dispatch({type:'SN',name:e.target.value})}/></div><div className="tsep"/>
      <div className="tg"><label>{"Ряды"}</label><select value={proj.rows} onChange={e=>{const nr=parseInt(e.target.value);if(nr<proj.rows){const ks=Object.keys(proj.slots).filter(k=>parseInt(k.split("-")[0])>=nr);if(ks.length&&!confirm("Предметы в удаляемых рядах будут удалены."))return;dispatch({type:'RM',keys:ks});}dispatch({type:'SR',rows:nr});}} style={{fontSize:"12px"}}>{[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}</option>)}</select></div><div className="tsep"/>
      <div className="tg"><button className="b" onClick={()=>dispatch({type:'UNDO'})} disabled={!state.past.length} title="Ctrl+Z">{"↩"}</button><button className="b" onClick={()=>dispatch({type:'REDO'})} disabled={!state.future.length} title="Ctrl+Y">{"↪"}</button></div><div className="tsep"/>
      <div className="tg">
        <button className="b" onClick={()=>setShowNums(!showNums)} style={showNums?{background:"var(--ac)",color:"#0f0f11",borderColor:"var(--ac)"}:{}} title={"Номера слотов"}>#</button>
        <button className="b" onClick={fillSel} disabled={!palItem||multiSel.size===0} title={"Залить выделенные"}>{"Залить"}</button>
        <button className="b bd" onClick={()=>{if(confirm("Очистить всё?")){dispatch({type:'CA'});setSelSlot(null);setMultiSel(new Set());}}} title={"Очистить всё"}>{"Очистить"}</button>
      </div><div style={{flex:1}}/>
      <div className="tg">
        <button className="b" onClick={()=>setShowGrad(true)} style={{borderImage:"linear-gradient(90deg,var(--ac),#22d3ee) 1",borderWidth:1,borderStyle:"solid"}}>{"Градиент"}</button>
        <button className="b" onClick={()=>setShowColorPicker(true)}><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"linear-gradient(135deg,#ff0000,#00ff00,#0000ff)",marginRight:3}}/>{"Цвета"}</button>
        <button className="b bp" onClick={()=>setShowExport(true)}>{"Экспорт"}</button>
        <div className="tsep"/>
        {mode==="editor"?<button className="b" onClick={()=>{const wl=loadWSList();if(wl.length){const ws=loadWS(wl[wl.length-1]);if(ws){openCanvas(ws);return;}}const ws=newWS();saveWS(ws);openCanvas(ws);}} style={{borderColor:"var(--ac)"}}>{"Canvas"}</button>
        :<button className="b" onClick={()=>setMode("editor")} style={{borderColor:"var(--ac)"}}>{"← Редактор"}</button>}
        <div className="burger" ref={menuRef}>
          <button className="b" onClick={()=>setShowMenu(!showMenu)}>{"☰"}</button>
          {showMenu&&<div className="burger-dd">
            <button className="b" onClick={()=>{setShowMenu(false);setShowTpls(true);}}>{"Шаблоны"}</button>
            <button className="b" onClick={()=>{setShowMenu(false);saveTpl();}}>{"Сохранить шаблон"}</button>
            <button className="b" onClick={()=>{setShowMenu(false);if(!palItem){alert("Сначала выберите предмет");return;}dispatch({type:'FE',data:makeSlot(palItem,palPreset)});}}>{"Залить пустые"}</button>
            <div style={{height:1,background:"var(--bd)",margin:"2px 0"}}/>
            <button className="b" onClick={()=>{setShowMenu(false);if(!confirm("Новый проект?"))return;saveProj(proj);dispatch({type:'LP',project:newProj()});setSelSlot(null);setMultiSel(new Set());}}>{"Новый проект"}</button>
            <button className="b" onClick={()=>{setShowMenu(false);setShowProjs(true);}}>{"Открыть проект"}</button>
            <div style={{height:1,background:"var(--bd)",margin:"2px 0"}}/>
            <button className="b" onClick={()=>{setShowMenu(false);const all=loadProjList().map(id=>loadProj(id)).filter(Boolean);const d={projects:all,templates:uTpls,exportedAt:new Date().toISOString()};const bl=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const u=URL.createObjectURL(bl);const a=document.createElement("a");a.href=u;a.download="mc-menu-backup.json";a.click();URL.revokeObjectURL(u);}}>{"Бэкап"}</button>
            <button className="b" onClick={()=>{setShowMenu(false);const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
if(d.projects){
  for(const p of d.projects)saveProj(p);
  if(d.templates){setUTpls(d.templates);saveUTpls(d.templates);}
  const last=d.projects[d.projects.length-1];
  if(last){dispatch({type:'LP',project:last});setSelSlot(null);setMultiSel(new Set());}
} else if(d.menu&&d.slots){
  const p=newProj(d.menu.title||"Imported",d.menu.rows||6);
  for(const s of d.slots){
    const row=Math.floor(s.slot/9),col=s.slot%9;
    const key=row+"-"+col;
    const dn=s.displayName&&s.displayName.segments?s.displayName.segments:[ds(s.displayName&&s.displayName.minimessage?parseMM(s.displayName.minimessage):"","#FFFFFF")];
    const lr=s.lore&&s.lore.segments?s.lore.segments:((s.lore&&s.lore.minimessage)?s.lore.minimessage.map(l=>parseMM(l)):[]);
    p.slots[key]={itemId:(s.material||"stone").toLowerCase(),displayName:Array.isArray(dn)?dn:[ds("")],lore:lr,amount:s.amount||1,enchanted:!!s.enchanted,customModelData:s.customModelData||null,hideFlags:0};
  }
  saveProj(p);dispatch({type:'LP',project:p});setSelSlot(null);setMultiSel(new Set());
}
}catch(err){alert("Ошибка: "+err.message);}};r.readAsText(f);};inp.click();}}>{"Импорт"}</button>
            <div style={{height:1,background:"var(--bd)",margin:"2px 0"}}/>
            <button className="b" onClick={()=>{setShowMenu(false);const ws=newWS();saveWS(ws);openCanvas(ws);}}>{"Новый workspace"}</button>
            {loadWSList().map(id=>{const ws=loadWS(id);return ws?<button key={id} className="b" onClick={()=>{setShowMenu(false);openCanvas(ws);}}>{"\uD83D\uDDFA "+ws.name}</button>:null;})}
          </div>}
        </div>
      </div>
    </div>
    {mode==="editor"?<div className="workspace">
      <Palette selItem={palItem} onSelect={(id,preset)=>{if(id===palItem&&!preset){setPalItem(null);setPalPreset(null);}else{setPalItem(id);setPalPreset(preset||null);}}} recent={recent}/>
      <Grid project={proj} selSlot={selSlot} multiSel={multiSel} onSlotMD={onSlotMD} onSlotCtx={onSlotCtx} dispatch={dispatch} showNums={showNums} setHTT={setHTT} onPaint={onPaint} onBgClick={()=>{setPalItem(null);setSelSlot(null);setMultiSel(new Set());}}/>
      <ItemEditor data={selSlot?proj.slots[selSlot]:null} slotKey={selSlot} dispatch={dispatch}/>
    </div>
    :<CanvasView workspace={activeWS} onUpdateWS={updateWS} onEditMenu={editMenuFromCanvas} projects={projectCache}/>}
    {mode==="editor"&&<div className="sb">
      <span>{selSlot?`Slot ${selSlot} (#${parseInt(selSlot.split("-")[0])*9+parseInt(selSlot.split("-")[1])})`:multiSel.size>1?`${multiSel.size} selected`:""}</span>
      <span>{palItem?`Размещение:${itemName(palItem)}`:""}</span>
      <span>{proj.rows}x9 {"·"} {Object.keys(proj.slots).length} предм. {"·"} {saveStatus}</span>
    </div>}
    {htt&&<HoverTT data={htt.data} x={htt.x} y={htt.y}/>}
    {showExport&&<ExportModal project={proj} onClose={()=>setShowExport(false)}/>}
    {showGrad&&<GradientModal onClose={()=>setShowGrad(false)} onApply={selSlot&&proj.slots[selSlot]?(segs)=>{dispatch({type:'SS',key:selSlot,data:{...proj.slots[selSlot],displayName:segs}});}:null}/>}
    {showColorPicker&&<ColorPickerModal onClose={()=>setShowColorPicker(false)}/>}
    {showTpls&&<TemplateModal onApply={applyTpl} onClose={()=>setShowTpls(false)} uTpls={uTpls} onDelTpl={delTpl}/>}
    {showProjs&&<ProjModal list={loadProjList()} onOpen={p=>{dispatch({type:'LP',project:p});setSelSlot(null);setMultiSel(new Set());setShowProjs(false);}} onDel={id=>{delProj(id);setShowProjs(false);}} onClose={()=>setShowProjs(false)}/>}
    {ctxMenu&&<CtxMenu x={ctxMenu.x} y={ctxMenu.y} items={ctxMenu.items} onClose={()=>setCtxMenu(null)}/>}
  </div>);
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
} catch(e) {
  document.getElementById("root").innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap">'+e.stack+'</pre>';
  console.error(e);
}
</script>
</body>
</html>
