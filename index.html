<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Menu Designer</title>
<link rel="icon" type="image/png" href="assets/minecraft/textures/item/axolotl_spawn_egg.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Minecraft';src:url('assets/fonts/Mojangles.ttf') format('truetype');font-weight:400;font-style:normal}
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
:root{--bg:#0f0f11;--bg2:#141416;--pan:#18181b;--srf:#1e1e22;--hov:#27272b;--tx1:#e4e4e7;--tx2:#8b8b96;--tx3:#5a5a64;--ac:#a78bfa;--ac2:#7c5cbf;--ac-g:rgba(167,139,250,.12);--ok:#4ade80;--er:#f87171;--inf:#60a5fa;--bd:#2a2a2e;--bd2:#3a3a40;--r8:8px}
input,select,button,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
input,textarea,select{background:var(--srf);border:1px solid var(--bd);border-radius:4px;padding:4px 8px;color:var(--tx1);outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:60px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
#root{height:100vh;display:flex;flex-direction:column}.app{display:flex;flex-direction:column;height:100%}

/* TOOLBAR */
.tb{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--bd);min-height:44px;flex-shrink:0;flex-wrap:wrap;backdrop-filter:blur(8px)}
.tg{display:flex;align-items:center;gap:4px}.tsep{width:1px;height:20px;background:var(--bd);margin:0 2px}
.tb .pn{background:transparent;border:1px solid transparent;padding:2px 6px;font-size:14px;font-weight:600;min-width:140px}
.tb .pn:hover{border-color:var(--bd)}.tb .pn:focus{border-color:var(--ac);background:var(--srf)}
.tb label{color:var(--tx2);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.b{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--r8);border:1px solid var(--bd);background:var(--pan);color:var(--tx2);font-size:11px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.b:hover{background:var(--hov);color:var(--tx1);border-color:var(--ac)}.b:active{transform:scale(.97)}.bp{background:var(--ac);color:#0f0f11;border-color:var(--ac);font-weight:600}.bp:hover{background:var(--ac2);border-color:var(--ac2)}
.bd{border-color:rgba(248,113,113,.25);color:var(--er)}.bd:hover{background:rgba(248,113,113,.08)}.b:disabled{opacity:.3;cursor:not-allowed;transform:none}.b:disabled:hover{background:var(--pan);border-color:var(--bd);color:var(--tx2)}
.workspace{display:flex;flex:1;overflow:hidden}

/* PALETTE */
.pal{width:260px;min-width:260px;background:var(--pan);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.pal-h{padding:8px 10px;border-bottom:1px solid var(--bd);font-weight:600;font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.pal-s{padding:5px 8px}.pal-s input{width:100%;padding:4px 7px;border-radius:5px;font-size:12px}
.pal-b{flex:1;overflow-y:auto;padding:3px 5px}
.pal-cat{margin-bottom:1px}
.pal-ch{display:flex;align-items:center;gap:4px;padding:4px 5px;cursor:pointer;border-radius:3px;font-size:11px;font-weight:500;color:var(--tx2);user-select:none}
.pal-ch:hover{background:var(--hov)}
.pal-ch .ar{font-size:8px;transition:transform .15s;display:inline-block}.pal-ch .ar.op{transform:rotate(90deg)}
.pi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;padding:2px 0}
.pi{display:flex;align-items:center;justify-content:center;padding:2px;border-radius:3px;cursor:pointer;aspect-ratio:1;border:2px solid transparent;transition:all .08s;position:relative;overflow:hidden}
.pi:hover{background:var(--hov);border-color:var(--bd)}.pi.sel{border-color:var(--ac);background:rgba(108,92,231,.15)}
.pi .itx{width:28px;height:28px;image-rendering:pixelated;pointer-events:none}
.pal-c{padding:5px 8px;border-top:1px solid var(--bd);display:flex;gap:3px}
.pal-c input{flex:1;min-width:0;font-size:11px}

/* GRID */
.grid-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:16px;position:relative}
.inv-f{background:#C6C6C6;padding:7px;border:3px solid;border-color:#FFF #555 #555 #FFF;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.inv-t{text-align:left;padding:2px 0 5px 7px;font-family:'Minecraft','Courier New',monospace;font-size:13px;color:#3F3F3F;font-weight:bold}
.inv-g{display:grid;grid-template-columns:repeat(9,48px);gap:2px}
.sl{width:48px;height:48px;position:relative;background:#8B8B8B;border:2px solid;border-color:#373737 #FFF #FFF #373737;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none}
.sl:hover .sl-hv{opacity:1}
.sl.sel{outline:2px solid #4A9EFF;outline-offset:-1px;z-index:2}
.sl.msel{outline:2px solid #4AFF9E;outline-offset:-1px;z-index:2}
.sl.drop{outline:2px solid #55FF55;outline-offset:-1px;z-index:2}.sl[draggable=true]{cursor:grab}.sl[draggable=true]:active{cursor:grabbing}
.sl-hv{position:absolute;inset:0;background:rgba(255,255,255,.22);pointer-events:none;opacity:0;transition:opacity .05s;z-index:1}
.sl-c{position:absolute;inset:1px;display:flex;align-items:center;justify-content:center;z-index:0}
.sl-c .itx{width:100%;height:100%;image-rendering:pixelated;pointer-events:none}
.sl-c .itx-e{font-size:24px;line-height:1;pointer-events:none}
.sl-a{position:absolute;bottom:0;right:2px;font-family:'Minecraft','Courier New',monospace;font-size:12px;color:#FFF;font-weight:bold;text-shadow:1.5px 1.5px 0 #3F3F3F,-1px -1px 0 #3F3F3F,1px -1px 0 #3F3F3F,-1px 1px 0 #3F3F3F;z-index:5;pointer-events:none}
.sl-n{position:absolute;top:0;left:1px;font-size:8px;color:rgba(255,255,255,.4);font-family:monospace;z-index:5;pointer-events:none}
.sl-en{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:3}
.sl-en::after{content:"";position:absolute;inset:-50%;background:linear-gradient(120deg,transparent 30%,rgba(128,0,255,.2) 50%,transparent 70%);animation:shim 2s infinite linear}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sel-ban{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:var(--ac);color:#fff;padding:5px 14px;border-radius:5px;font-size:11px;font-weight:500;z-index:50;display:flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(0,0,0,.4)}

/* EDITOR */
.ed{width:440px;min-width:440px;background:var(--pan);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.ed-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--tx3);font-size:13px;text-align:center;padding:20px}
.ed-body{flex:1;overflow-y:auto;padding:12px}
.ed-hdr{display:flex;align-items:center;gap:8px;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid var(--bd)}
.ed-hdr .itx{width:32px;height:32px;image-rendering:pixelated}
.ed-hdr .iid{font-family:monospace;color:var(--tx2);font-size:11px}
.ed-s{margin-bottom:12px}
.ed-st{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin-bottom:4px;font-weight:600}

/* Editor tabs */
.ed-tabs{display:flex;gap:1px;margin-bottom:6px;background:var(--bd);border-radius:4px;overflow:hidden}
.ed-tab{flex:1;padding:4px 8px;font-size:10px;text-align:center;background:var(--srf);color:var(--tx2);cursor:pointer;text-transform:uppercase;letter-spacing:.3px}
.ed-tab:hover{background:var(--hov)}.ed-tab.on{background:var(--ac);color:#fff}

/* Segment editor */
.seg-r{display:flex;gap:2px;align-items:center;margin-bottom:2px}
.seg-c{width:24px;height:24px;border-radius:3px;cursor:pointer;border:2px solid var(--bd);flex-shrink:0}
.seg-t{flex:1;min-width:0;padding:2px 6px;font-size:12px}
.seg-f{display:flex;gap:1px;flex-shrink:0}
.fb{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:9px;font-weight:700;border:1px solid var(--bd);color:var(--tx2)}
.fb:hover{background:var(--hov)}.fb.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.seg-x{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:2px;color:var(--er);font-size:12px;flex-shrink:0}
.seg-x:hover{background:rgba(225,112,85,.15)}
.ab{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;color:var(--inf);font-size:10px;border-radius:3px}
.ab:hover{background:var(--hov)}

/* MiniMessage input */
.mm-input{width:100%;font-family:'Minecraft','Courier New',monospace;font-size:12px;padding:6px 8px;min-height:50px;background:#0d1117;color:#c9d1d9;border:1px solid var(--bd);border-radius:4px}
.mm-input:focus{border-color:var(--ac)}
.mm-help{font-size:9px;color:var(--tx3);margin-top:2px;line-height:1.3}

/* Preview */
.prev-box{padding:8px;background:#100010;border-radius:5px;margin-top:4px;border:2px solid transparent;border-image:linear-gradient(to bottom,#28007F,#140040) 1}
.mc-tx{font-family:'Minecraft','Courier New',monospace;text-shadow:2px 2px 0 rgba(0,0,0,.4);-webkit-font-smoothing:none;-moz-osx-font-smoothing:unset;image-rendering:pixelated}.mc-b{font-weight:400;text-shadow:2px 2px 0 rgba(0,0,0,.4),1px 0 0 currentColor}.mc-i{font-style:italic}.mc-u{text-decoration:underline}.mc-s{text-decoration:line-through}
.mc-o span{animation:obf .1s infinite steps(1)}
@keyframes obf{0%{opacity:1}25%{opacity:.6}50%{opacity:1}75%{opacity:.8}}
.mc-tt-id{color:#555;font-size:10px;margin-top:3px}
.prev-box .line{font-family:'Minecraft','Courier New',monospace;font-size:14px;line-height:1.35;white-space:nowrap;min-height:18px}

/* Lore lines */
.lore-line{margin-bottom:4px;padding:5px;background:var(--srf);border-radius:3px;border:1px solid var(--bd)}
.lore-line-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.lore-line-h span{font-size:9px;color:var(--tx3)}

/* Properties */
.props{display:grid;grid-template-columns:auto 1fr;gap:5px;align-items:center}
.props label{font-size:10px;color:var(--tx2)}
.amt{display:flex;align-items:center;gap:2px}
.amt input{width:42px;text-align:center;font-size:12px}
.amt button{width:20px;height:20px;border-radius:2px;background:var(--srf);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px}
.amt button:hover{background:var(--hov)}
.tog{width:32px;height:16px;border-radius:8px;position:relative;background:var(--srf);border:1px solid var(--bd);cursor:pointer;transition:background .2s}
.tog.on{background:var(--ac);border-color:var(--ac)}
.tog::after{content:"";position:absolute;width:10px;height:10px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.tog.on::after{transform:translateX(16px)}
.ed-acts{display:flex;gap:4px;padding-top:8px;border-top:1px solid var(--bd);margin-top:6px}

/* Hover tooltip */
.htt{position:fixed;z-index:9999;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.7))}
.htt .prev-box{max-width:min(420px,80vw);width:max-content}.htt .prev-box .line{white-space:pre-wrap;word-break:break-word}

/* Color picker */
.cp{position:absolute;z-index:100;background:var(--pan);border:1px solid var(--bd2);border-radius:5px;padding:8px;box-shadow:0 6px 16px rgba(0,0,0,.5);width:200px}
.cp-t{font-size:9px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase}
.cg{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-bottom:5px}
.cs{width:18px;height:18px;border-radius:2px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.cs:hover{transform:scale(1.15)}.cs.on{border-color:#fff}
.ch{display:flex;gap:3px}.ch input{flex:1;min-width:0;font-family:monospace;font-size:10px}

/* Modals */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.md{background:var(--pan);border:1px solid var(--bd2);border-radius:8px;padding:18px;min-width:460px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 14px 40px rgba(0,0,0,.5)}
.md-t{font-size:16px;font-weight:600;margin-bottom:12px}
.md-tabs{display:flex;gap:1px;margin-bottom:12px}.md-tab{padding:5px 12px;border-radius:4px;font-size:11px;color:var(--tx2);cursor:pointer}
.md-tab:hover{background:var(--hov)}.md-tab.on{background:var(--ac);color:#fff}
.md-code{background:#0d1117;border:1px solid var(--bd);border-radius:5px;padding:12px;font-family:'Minecraft','Courier New',monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:350px;overflow-y:auto;color:#c9d1d9;line-height:1.5}
.md-acts{display:flex;gap:5px;margin-top:12px;justify-content:flex-end}
.tg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.tc{background:var(--srf);border:1px solid var(--bd);border-radius:5px;padding:12px;cursor:pointer;transition:border-color .15s}
.tc:hover{border-color:var(--ac)}.tc-n{font-weight:600;margin-bottom:2px;font-size:12px}.tc-d{font-size:10px;color:var(--tx2);margin-bottom:4px}.tc-s{font-size:9px;color:var(--tx3)}

/* Status bar */
.sb{display:flex;align-items:center;justify-content:space-between;padding:2px 12px;background:var(--pan);border-top:1px solid var(--bd);font-size:10px;color:var(--tx3);flex-shrink:0}

/* Context menu */
.ctx{position:fixed;z-index:200;background:var(--pan);border:1px solid var(--bd2);border-radius:4px;padding:2px;min-width:140px;box-shadow:0 6px 16px rgba(0,0,0,.5)}
.ci{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:2px;font-size:11px;cursor:pointer;width:100%}
.ci:hover{background:var(--hov)}.ci.dg{color:var(--er)}.csep{height:1px;background:var(--bd);margin:2px 0}

/* Lore template dropdown */
.ldd{position:absolute;z-index:100;background:var(--pan);border:1px solid var(--bd2);border-radius:5px;padding:2px;box-shadow:0 6px 16px rgba(0,0,0,.5);width:220px;max-height:240px;overflow-y:auto}
.ldi{padding:5px 8px;border-radius:2px;cursor:pointer;font-size:11px}.ldi:hover{background:var(--hov)}
/* Burger dropdown */
.burger{position:relative}
.burger-dd{position:absolute;top:100%;right:0;margin-top:4px;background:var(--pan);border:1px solid var(--bd2);border-radius:var(--r8);padding:4px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:100;display:flex;flex-direction:column;gap:1px}
.burger-dd .b{justify-content:flex-start;width:100%;border:none;border-radius:4px}
.pi.eraser{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3)}.pi.eraser:hover{background:rgba(248,113,113,.2);border-color:var(--er)}.pi.eraser.sel{background:rgba(248,113,113,.25);border-color:var(--er)}

/* Canvas */
.canvas-wrap{flex:1;overflow:hidden;position:relative;background:#0a0a0c;cursor:grab}
.canvas-wrap.grabbing{cursor:grabbing}
.canvas-surf{position:absolute;top:0;left:0;transform-origin:0 0}
.canvas-grid-bg{position:absolute;inset:0;background-image:radial-gradient(circle,#1a1a1e 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.mm{position:absolute;background:var(--pan);border:1px solid var(--bd);border-radius:var(--r8);box-shadow:0 4px 16px rgba(0,0,0,.4);user-select:none;min-width:120px;z-index:2}
.mm:hover{border-color:var(--bd2)}
.mm.active{border-color:var(--ac)}
.mm-hdr{padding:4px 8px;font-size:11px;font-weight:600;color:var(--tx1);cursor:grab;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:4px;border-radius:var(--r8) var(--r8) 0 0}
.mm-hdr:active{cursor:grabbing}
.mm-grid{display:grid;grid-template-columns:repeat(9,20px);gap:1px;padding:3px;background:var(--srf);border-radius:0 0 var(--r8) var(--r8)}
.mm-sl{width:20px;height:20px;background:#8B8B8B;border:1px solid;border-color:#555 #aaa #aaa #555;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
.mm-sl:hover{outline:1px solid var(--ac);z-index:1}
.mm-sl.conn-src{outline:2px solid #4ade80;z-index:2}
.mm-sl .itx{width:16px;height:16px;image-rendering:pixelated}
.canvas-tb{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;align-items:center}
.conn-line{stroke:var(--ac);stroke-width:2;fill:none;marker-end:url(#arrowhead)}
.conn-line:hover{stroke:#f87171;stroke-width:3;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useReducer,useEffect,useCallback,useRef,useMemo}=React;

// ========== DATA ==========
const COLORS="black:0:#000000,dark_blue:1:#0000AA,dark_green:2:#00AA00,dark_aqua:3:#00AAAA,dark_red:4:#AA0000,dark_purple:5:#AA00AA,gold:6:#FFAA00,gray:7:#AAAAAA,dark_gray:8:#555555,blue:9:#5555FF,green:a:#55FF55,aqua:b:#55FFFF,red:c:#FF5555,light_purple:d:#FF55FF,yellow:e:#FFFF55,white:f:#FFFFFF";
const MC_COLORS=COLORS.split(",").map(s=>{const[m,c,h]=s.split(":");return{m,c:"\u00A7"+c,h};});

const _c=["white","orange","magenta","light_blue","yellow","lime","pink","gray","light_gray","cyan","purple","blue","brown","green","red","black"];
const _w=["oak","spruce","birch","jungle","acacia","dark_oak","cherry","mangrove","bamboo","crimson","warped","pale_oak"];
const _t=["wooden","stone","iron","golden","diamond","netherite"];

// Item database: id → display name. Organized by category.
const ITEM_DB={
glass_panes:{label:"Стеклянные панели",items:_c.map(c=>({id:c+"_stained_glass_pane",name:c.replace(/_/g," ")+" Glass Pane"})).concat([{id:"glass_pane",name:"Glass Pane"}])},
stained_glass:{label:"Окрашенное стекло",items:_c.map(c=>({id:c+"_stained_glass",name:c.replace(/_/g," ")+" Glass"})).concat([{id:"glass",name:"Glass"},{id:"tinted_glass",name:"Tinted Glass"}])},
wool:{label:"Шерсть",items:_c.map(c=>({id:c+"_wool",name:c.replace(/_/g," ")+" Wool"}))},
concrete:{label:"Бетон",items:_c.map(c=>({id:c+"_concrete",name:c.replace(/_/g," ")+" Concrete"}))},
terracotta:{label:"Терракота",items:[{id:"terracotta",name:"Terracotta"},..._c.map(c=>({id:c+"_terracotta",name:c.replace(/_/g," ")+" Terracotta"}))]},
carpet:{label:"Ковры",items:_c.map(c=>({id:c+"_carpet",name:c.replace(/_/g," ")+" Carpet"}))},
dyes:{label:"Красители",items:_c.map(c=>({id:c+"_dye",name:c.replace(/_/g," ")+" Dye"}))},
planks:{label:"Доски",items:_w.map(w=>({id:w+"_planks",name:w.replace(/_/g," ")+" Planks"}))},
logs:{label:"Брёвна",items:_w.filter(w=>!["crimson","warped","bamboo"].includes(w)).map(w=>({id:w+"_log",name:w.replace(/_/g," ")+" Log"})).concat([{id:"crimson_stem",name:"Crimson Stem"},{id:"warped_stem",name:"Warped Stem"},{id:"bamboo_block",name:"Bamboo Block"}])},
building:{label:"Строительные",items:[
  "stone","cobblestone","deepslate","cobbled_deepslate","dirt","grass_block","coarse_dirt","rooted_dirt","mud","sand","red_sand","gravel",

let RU_LOADED={};
// Load ru_ru.json from MC assets at startup
fetch("assets/minecraft/lang/ru_ru.json").then(r=>r.ok?r.json():null).then(data=>{
  if(!data){console.warn("ru_ru.json: no data");return;}
  for(const[key,val] of Object.entries(data)){
    if(key.startsWith("item.minecraft."))RU_LOADED[key.slice(15)]=val;
    else if(key.startsWith("block.minecraft.")&&!RU_LOADED[key.slice(16)])RU_LOADED[key.slice(16)]=val;
  }
  console.log("ru_ru.json loaded:",Object.keys(RU_LOADED).length,"items");
  if(window._forceUpdate)window._forceUpdate();
}).catch(e=>{console.warn("ru_ru.json error:",e);});

// ========== FUNITEMS LOADER ==========
function parseFunMaterial(item){
  if(item.components){const m=item.components.match(/^minecraft:([a-z_]+)/);if(m)return m[1];}
  if(item.item){const m=item.item.match(/^([A-Z_]+)/);if(m)return m[1].toLowerCase();}
  return"stone";
}
function parseFunPotionColor(entry){
  if(entry.components){const m=entry.components.match(/custom_color:\s*(\d+)/);if(m){const v=parseInt(m[1]);return"#"+((v>>16)&0xFF).toString(16).padStart(2,"0")+((v>>8)&0xFF).toString(16).padStart(2,"0")+(v&0xFF).toString(16).padStart(2,"0");}}
  if(entry.item){const m=entry.item.match(/CustomPotionColor:\s*(\d+)/);if(m){const v=parseInt(m[1]);return"#"+((v>>16)&0xFF).toString(16).padStart(2,"0")+((v>>8)&0xFF).toString(16).padStart(2,"0")+(v&0xFF).toString(16).padStart(2,"0");}}
  return null;
}
function parseFunSkull(entry){
  const props=entry.properties;
  if(props&&props.skull&&props.skull.texture){
    try{const json=JSON.parse(atob(props.skull.texture));const url=json.textures&&json.textures.SKIN&&json.textures.SKIN.url;if(url)return url;}catch(e){}
  }
  return null;
}
function loadFunItems(){
  fetch("assets/funitems/index.json").then(r=>r.ok?r.json():[]).then(files=>{
    const promises=files.map(f=>fetch("assets/funitems/"+f).then(r=>r.ok?r.json():null).catch(()=>null));
    Promise.all(promises).then(results=>{
      let total=0;
      for(const data of results){
        if(!data||!data.items)continue;
        const catId="ft_"+(data.categoryId||"misc").replace(/[^a-z0-9]/g,"_");
        const catLabel="FT: "+(data.categoryId||"misc").replace(/[-_]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
        const items=[];
        for(const entry of data.items){
          const props=entry.properties;if(!props)continue;
          const mat=parseFunMaterial(entry);
          const display=props.display||props.identifier||mat;
          const lores=props.lores||[];
          const ench=props.enchantments&&Object.keys(props.enchantments).length>0;
          const pc=parseFunPotionColor(entry);
          const skull=parseFunSkull(entry);
          items.push({id:mat,name:(props.identifier||mat).replace(/[-_]/g," "),preset:{
            displayName:parseMM(display),
            lore:lores.map(l=>parseMM(l)),
            enchanted:ench,
            potionColor:pc,
            skullTexture:skull,
          }});
          total++;
        }
        if(items.length)ITEM_DB[catId]={label:catLabel,preset:true,items};
      }
      console.log("FunItems loaded:",total,"items");
      if(window._forceUpdate)window._forceUpdate();
    });
  }).catch(e=>{console.warn("FunItems error:",e);});
}
loadFunItems();

function closestMC(hex){hex=hex.toUpperCase();const m=MC_COLORS.find(c=>c.h.toUpperCase()===hex);if(m)return m.c;let b=MC_COLORS[15],bd=Infinity;const r1=parseInt(hex.slice(1,3),16),g1=parseInt(hex.slice(3,5),16),b1=parseInt(hex.slice(5,7),16);for(const c of MC_COLORS){const r2=parseInt(c.h.slice(1,3),16),g2=parseInt(c.h.slice(3,5),16),b2=parseInt(c.h.slice(5,7),16);const d=(r1-r2)**2+(g1-g2)**2+(b1-b2)**2;if(d<bd){bd=d;b=c;}}return b.c;}
function mcName(hex){hex=hex.toUpperCase();const m=MC_COLORS.find(c=>c.h.toUpperCase()===hex);return m?m.m:null;}
function seg2leg(segs){if(!segs||!segs.length)return"";let r="";for(const s of segs){r+=closestMC(s.color);if(s.bold)r+="\u00A7l";if(s.italic)r+="\u00A7o";if(s.underlined)r+="\u00A7n";if(s.strikethrough)r+="\u00A7m";if(s.obfuscated)r+="\u00A7k";r+=s.text;}return r;}
function colorDist(c1,c2){const a=hexToRgb(c1),b=hexToRgb(c2);return Math.max(Math.abs(a.r-b.r),Math.abs(a.g-b.g),Math.abs(a.b-b.b));}
function detectGradientStops(colors){
  const n=colors.length;if(n<2)return null;
  for(let k=2;k<=Math.min(n,8);k++){
    const stops=[];for(let i=0;i<k;i++){const idx=k===1?0:Math.round(i*(n-1)/(k-1));stops.push(colors[idx]);}
    let ok=true;
    for(let i=0;i<n;i++){
      const t=n===1?0:i/(n-1);const ts=k-1;const si=Math.min(Math.floor(t*ts),ts-1);const st=(t*ts)-si;
      const exp=lerpColor(stops[si],stops[si+1],st);
      if(colorDist(colors[i],exp)>3){ok=false;break;}
    }
    if(ok)return stops;
  }
  return null;
}
function seg2mm(segs){if(!segs||!segs.length)return"";
  // Detect gradient: all single-char segments with same formatting
  if(segs.length>=3&&segs.every(s=>s.text.length===1)){
    const{bold,italic,underlined,strikethrough,obfuscated}=segs[0];
    if(segs.every(s=>s.bold===bold&&s.italic===italic&&s.underlined===underlined&&s.strikethrough===strikethrough&&s.obfuscated===obfuscated)){
      const stops=detectGradientStops(segs.map(s=>s.color));
      if(stops){
        let inner=segs.map(s=>s.text).join('');
        if(obfuscated)inner=`<obfuscated>${inner}</obfuscated>`;
        if(strikethrough)inner=`<strikethrough>${inner}</strikethrough>`;
        if(underlined)inner=`<underlined>${inner}</underlined>`;
        if(italic)inner=`<italic>${inner}</italic>`;
        if(bold)inner=`<bold>${inner}</bold>`;
        return`<gradient:${stops.join(':')}>${inner}</gradient>`;
      }
    }
  }
  let r="";for(const s of segs){const cn=mcName(s.color)||s.color;let inner=s.text;if(s.obfuscated)inner=`<obfuscated>${inner}</obfuscated>`;if(s.strikethrough)inner=`<strikethrough>${inner}</strikethrough>`;if(s.underlined)inner=`<underlined>${inner}</underlined>`;if(s.italic)inner=`<italic>${inner}</italic>`;if(s.bold)inner=`<bold>${inner}</bold>`;r+=`<${cn}>${inner}</${cn}>`;}return r;}

// ========== MINIMESSAGE PARSER ==========
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function rgbToHex(r,g,b){return"#"+[r,g,b].map(x=>x.toString(16).padStart(2,"0")).join("").toUpperCase();}
function lerpColor(c1,c2,t){const a=hexToRgb(c1),b=hexToRgb(c2);return rgbToHex(Math.round(a.r+(b.r-a.r)*t),Math.round(a.g+(b.g-a.g)*t),Math.round(a.b+(b.b-a.b)*t));}

function parseMM(input){
  if(!input||!input.trim())return[];
  const segs=[];let pos=0;
  const DEF={color:"#FFFFFF",bold:false,italic:false,underlined:false,strikethrough:false,obfuscated:false};
  const stack=[{...DEF}];
  const cur=()=>stack[stack.length-1];
  const FMT={bold:"bold",b:"bold",italic:"italic",i:"italic",em:"italic",underlined:"underlined",u:"underlined",strikethrough:"strikethrough",st:"strikethrough",obfuscated:"obfuscated",obf:"obfuscated"};

  // Pre-process: expand <gradient:...>text</gradient> into per-char color tags
  const expandGradients=(str)=>{
    return str.replace(/<gradient((?::#[0-9A-Fa-f]{6})+)>([\s\S]*?)<\/gradient>/gi,(match,colorsStr,text)=>{
      const colors=colorsStr.split(':').filter(Boolean).map(c=>c.toUpperCase());
      if(colors.length<2||text.length===0)return text;
      let result='';
      const len=text.length;
      for(let i=0;i<len;i++){
        const t=len===1?0:i/(len-1);
        // Multi-stop gradient: find which segment we're in
        const totalSegs=colors.length-1;
        const segIdx=Math.min(Math.floor(t*totalSegs),totalSegs-1);
        const segT=(t*totalSegs)-segIdx;
        const hex=lerpColor(colors[segIdx],colors[segIdx+1],segT);
        result+=`<${hex}>${text[i]}</${hex}>`;
      }
      return result;
    });
  };

  input=expandGradients(input);

  while(pos<input.length){
    if(input[pos]==='<'){
      const gt=input.indexOf('>',pos);
      if(gt===-1){segs.push({...cur(),text:input.slice(pos)});break;}
      const tag=input.slice(pos+1,gt).trim();pos=gt+1;
      // Closing tag
      if(tag.startsWith('/')){if(stack.length>1)stack.pop();continue;}
      // Reset
      if(tag==='reset'||tag==='r'){stack.length=1;stack[0]={...DEF};continue;}
      // Newline (ignore, handled by line splitting)
      if(tag==='newline'||tag==='br')continue;
      const st={...cur()};
      // Format tags
      if(FMT[tag]){st[FMT[tag]]=true;}
      // Hex color: <#RRGGBB>
      else if(tag.startsWith('#')&&/^#[0-9A-Fa-f]{6}$/.test(tag)){st.color=tag.toUpperCase();}
      // color:name or c:name syntax
      else if(tag.startsWith('color:')||tag.startsWith('c:')){
        const cn=tag.split(':')[1];
        if(cn.startsWith('#')&&/^#[0-9A-Fa-f]{6}$/.test(cn))st.color=cn.toUpperCase();
        else{const mc=MC_COLORS.find(c=>c.m===cn);if(mc)st.color=mc.h;}
      }
      // MC color name
      else{const mc=MC_COLORS.find(c=>c.m===tag);if(mc)st.color=mc.h;}
      stack.push(st);
    }else{
      let end=input.indexOf('<',pos);if(end===-1)end=input.length;
      const text=input.slice(pos,end);pos=end;
      if(text){const s=cur();segs.push({text,color:s.color,bold:s.bold,italic:s.italic,underlined:s.underlined,strikethrough:s.strikethrough,obfuscated:s.obfuscated});}
    }
  }
  // Merge adjacent segments with same formatting
  const merged=[];
  for(const s of segs){
    const last=merged[merged.length-1];
    if(last&&last.color===s.color&&last.bold===s.bold&&last.italic===s.italic&&last.underlined===s.underlined&&last.strikethrough===s.strikethrough&&last.obfuscated===s.obfuscated){
      last.text+=s.text;
    }else{merged.push({...s});}
  }
  return merged;
}

function newProj(name="Новое меню",rows=6){return{id:gid(),name,rows,cols:9,slots:{},createdAt:Date.now(),updatedAt:Date.now()};}
function applyAct(p,a){const r={...p,updatedAt:Date.now()};switch(a.type){
  case'SS':{const sl={...r.slots};sl[a.key]=a.data;return{...r,slots:sl};}
  case'SM':{const sl={...r.slots};for(const[k,v]of Object.entries(a.slots))sl[k]=v;return{...r,slots:sl};}
  case'RS':{const sl={...r.slots};delete sl[a.key];return{...r,slots:sl};}
  case'RM':{const sl={...r.slots};for(const k of a.keys)delete sl[k];return{...r,slots:sl};}
  case'MV':{const sl={...r.slots};const s=sl[a.from],d=sl[a.to];if(s)sl[a.to]=s;else delete sl[a.to];if(d)sl[a.from]=d;else delete sl[a.from];return{...r,slots:sl};}
  case'SR':return{...r,rows:a.rows};case'SN':return{...r,name:a.name};case'CA':return{...r,slots:{}};
  case'FE':{const sl={...r.slots};for(let row=0;row<r.rows;row++)for(let c=0;c<9;c++){const k=`${row}-${c}`;if(!sl[k])sl[k]=JSON.parse(JSON.stringify(a.data));}return{...r,slots:sl};}
  default:return r;
}}
function reducer(state,action){
  if(action.type==='UNDO'){if(!state.past.length)return state;return{past:state.past.slice(0,-1),present:state.past[state.past.length-1],future:[state.present,...state.future.slice(0,49)]};}
  if(action.type==='REDO'){if(!state.future.length)return state;return{past:[...state.past.slice(-49),state.present],present:state.future[0],future:state.future.slice(1)};}
  if(action.type==='LP')return{past:[],present:action.project,future:[]};
  if(action.type==='SN')return{...state,present:{...state.present,name:action.name,updatedAt:Date.now()}};
  return{past:[...state.past.slice(-49),state.present],present:applyAct(state.present,action),future:[]};
}

// ========== 3D RENDER ENGINE ==========
const CACHE_VERSION = 7;
const RENDER_SIZE = 64;
const MODELS_BASE = "assets/minecraft/models/";
const ITEMS_BASE = "assets/minecraft/items/";
const TEX_BASE = "assets/minecraft/textures/";

const _jsonCache = new Map();
async function fetchJSON(path) {
  if (_jsonCache.has(path)) return _jsonCache.get(path);
  try {
    const r = await fetch(path);
    if (!r.ok) return null;
    const data = await r.json();
    _jsonCache.set(path, data);
    return data;
  } catch(e) { return null; }
}

const _resolvedModels = new Map();

async function resolveModel(modelPath) {
  if (_resolvedModels.has(modelPath)) return _resolvedModels.get(modelPath);

  const chain = [];
  let cur = modelPath;

  while (cur) {
    const clean = cur.replace("minecraft:", "");
    const json = await fetchJSON(MODELS_BASE + clean + ".json");
    if (!json) break;
    chain.push(json);
    if (!json.parent || json.parent === "builtin/generated" || json.parent === "builtin/entity") break;
    cur = json.parent;
  }

  const result = { textures: {}, elements: null, display: null, guiLight: "side", type: "block" };

  for (let i = chain.length - 1; i >= 0; i--) {
    const m = chain[i];
    if (m.textures) Object.assign(result.textures, m.textures);
    if (m.elements) result.elements = JSON.parse(JSON.stringify(m.elements));
    if (m.display) result.display = { ...(result.display || {}), ...m.display };
    if (m.gui_light) result.guiLight = m.gui_light;
  }

  const lastParent = chain.length > 0 ? (chain[chain.length - 1].parent || "") : "";
  if (lastParent === "builtin/generated") result.type = "generated";
  else if (lastParent === "builtin/entity") result.type = "entity";

  const resolveTexRef = (ref, depth = 0) => {
    if (!ref || depth > 10) return ref;
    if (ref.startsWith("#")) {
      const alias = ref.slice(1);
      const resolved = result.textures[alias];
      return resolved ? resolveTexRef(resolved, depth + 1) : ref;
    }
    return ref.replace("minecraft:", "");
  };

  for (const [k, v] of Object.entries(result.textures)) {
    result.textures[k] = resolveTexRef(v);
  }

  if (result.elements) {
    for (const el of result.elements) {
      if (el.faces) {
        for (const face of Object.values(el.faces)) {
          if (face.texture) face.texture = resolveTexRef(face.texture);
        }
      }
    }
  }

  _resolvedModels.set(modelPath, result);
  return result;
}

async function getItemModel(itemId) {
  const itemDef = await fetchJSON(ITEMS_BASE + itemId + ".json");
  if (!itemDef || !itemDef.model || !itemDef.model.model) return null;
  return resolveModel(itemDef.model.model);
}

const _texImageCache = new Map();

function loadTexImage(texPath) {
  const clean = texPath.replace("minecraft:", "");
  const fullPath = TEX_BASE + clean + ".png";
  if (_texImageCache.has(fullPath)) return _texImageCache.get(fullPath);

  const promise = new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = fullPath;
  });
  _texImageCache.set(fullPath, promise);
  return promise;
}

function createThreeTexture(img) {
  const tex = new THREE.Texture(img);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  tex.encoding = THREE.sRGBEncoding;
  tex.needsUpdate = true;
  return tex;
}

let _renderer = null;
let _scene = null;
let _camera = null;

function initRenderer() {
  if (_renderer) return;
  const canvas = document.createElement("canvas");
  canvas.width = RENDER_SIZE;
  canvas.height = RENDER_SIZE;
  _renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true, preserveDrawingBuffer: true });
  _renderer.setSize(RENDER_SIZE, RENDER_SIZE);
  _renderer.setClearColor(0x000000, 0);

  _scene = new THREE.Scene();

  const s = 0.68;
  _camera = new THREE.OrthographicCamera(-s, s, s, -s, 0.1, 100);
  _camera.position.set(0, 0, 5);
  _camera.lookAt(0, 0, 0);
}

const FACE_ORDER = ["east", "west", "up", "down", "south", "north"];

function buildElementMesh(element, textures) {
  const [x1, y1, z1] = element.from;
  const [x2, y2, z2] = element.to;

  const sx = (x2 - x1) / 16, sy = (y2 - y1) / 16, sz = (z2 - z1) / 16;
  const cx = (x1 + x2) / 32 - 0.5, cy = (y1 + y2) / 32 - 0.5, cz = (z1 + z2) / 32 - 0.5;

  const geo = new THREE.BoxGeometry(sx, sy, sz);

  const mats = FACE_ORDER.map(faceName => {
    const faceDef = element.faces && element.faces[faceName];
    if (!faceDef || !faceDef.texture) {
      return new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.FrontSide });
    }
    const texPath = faceDef.texture.startsWith("#") ? null : faceDef.texture;
    if (!texPath || !textures[texPath]) {
      return new THREE.MeshLambertMaterial({ color: 0xFF00FF });
    }
    const mat = new THREE.MeshLambertMaterial({ map: textures[texPath], transparent: true, alphaTest: 0.1 });

    if (faceDef.uv) {
      const uvs = geo.attributes.uv;
      const faceIdx = FACE_ORDER.indexOf(faceName);
      const [u1, v1, u2, v2] = faceDef.uv;
      const base = faceIdx * 4;
      const nu1 = u1 / 16, nv1 = 1 - v2 / 16, nu2 = u2 / 16, nv2 = 1 - v1 / 16;
      uvs.setXY(base, nu1, nv2);
      uvs.setXY(base + 1, nu2, nv2);
      uvs.setXY(base + 2, nu1, nv1);
      uvs.setXY(base + 3, nu2, nv1);
    }

    if (faceDef.rotation) {
      const uvs = geo.attributes.uv;
      const fIdx = FACE_ORDER.indexOf(faceName);
      const b = fIdx * 4;
      const rotSteps = faceDef.rotation / 90;
      const uvArr = [];
      for (let vi = 0; vi < 4; vi++) uvArr.push([uvs.getX(b + vi), uvs.getY(b + vi)]);
      for (let vi = 0; vi < 4; vi++) {
        const ri = (vi + rotSteps) % 4;
        uvs.setXY(b + vi, uvArr[ri][0], uvArr[ri][1]);
      }
    }

    geo.attributes.uv.needsUpdate = true;
    return mat;
  });

  const mesh = new THREE.Mesh(geo, mats);
  mesh.position.set(cx, cy, cz);

  if (element.rotation) {
    const { origin, axis, angle } = element.rotation;
    const ox = (origin[0] / 16) - 0.5, oy = (origin[1] / 16) - 0.5, oz = (origin[2] / 16) - 0.5;
    mesh.position.sub(new THREE.Vector3(ox, oy, oz));
    const rad = THREE.MathUtils.degToRad(angle);
    const axisVec = new THREE.Vector3(axis === "x" ? 1 : 0, axis === "y" ? 1 : 0, axis === "z" ? 1 : 0);
    if (axis === "x") mesh.rotateX(rad);
    else if (axis === "y") mesh.rotateY(rad);
    else if (axis === "z") mesh.rotateZ(rad);
    mesh.position.applyAxisAngle(axisVec, rad);
    mesh.position.add(new THREE.Vector3(ox, oy, oz));
  }

  return mesh;
}

async function renderItemTo3D(itemId) {
  if (TEX_MAP[itemId]) return null;
  initRenderer();
  const model = await getItemModel(itemId);
  if (!model) return null;

  while (_scene.children.length) _scene.remove(_scene.children[0]);

  if (model.guiLight === "front") {
    _scene.add(new THREE.AmbientLight(0xffffff, 1.3));
  } else {
    _scene.add(new THREE.AmbientLight(0xffffff, 0.85));
    const dir = new THREE.DirectionalLight(0xffffff, 0.55);
    dir.position.set(-0.8, 1.2, 0.6);
    _scene.add(dir);
  }

  if (model.type === "generated" || model.type === "entity") return null;
  if (!model.elements) return null;

  const texPaths = new Set();
  for (const el of model.elements) {
    if (!el.faces) continue;
    for (const f of Object.values(el.faces)) {
      if (f.texture && !f.texture.startsWith("#")) texPaths.add(f.texture);
    }
  }

  const texMap = {};
  await Promise.all([...texPaths].map(async p => {
    const img = await loadTexImage(p);
    if (img) texMap[p] = createThreeTexture(img);
  }));

  const group = new THREE.Group();
  for (const el of model.elements) {
    group.add(buildElementMesh(el, texMap));
  }

  const gui = model.display && model.display.gui;
  if (gui) {
    if (gui.translation) group.position.set(gui.translation[0] / 16, gui.translation[1] / 16, gui.translation[2] / 16);
    if (gui.rotation) {
      group.rotateY(THREE.MathUtils.degToRad(gui.rotation[1]));
      group.rotateX(THREE.MathUtils.degToRad(gui.rotation[0]));
      group.rotateZ(THREE.MathUtils.degToRad(gui.rotation[2]));
    }
  }

  _scene.add(group);
  _renderer.render(_scene, _camera);
  return _renderer.domElement.toDataURL("image/png");
}

// ========== RENDER CACHE ==========
const _renderCache = new Map();

const renderCache = {
  get(itemId) { return _renderCache.get(itemId) || null; },
  set(itemId, dataURL) { _renderCache.set(itemId, dataURL); },
  has(itemId) { return _renderCache.has(itemId); },
};

const IDB_NAME = "mc-render-cache";
const IDB_STORE = "icons";

function openIDB() {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    } catch(e) { resolve(null); }
  });
}

async function idbGet(itemId) {
  const db = await openIDB();
  if (!db) return null;
  return new Promise(resolve => {
    try {
      const tx = db.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get(itemId);
      req.onsuccess = () => {
        const val = req.result;
        if (val && val.version === CACHE_VERSION) resolve(val.dataURL);
        else resolve(null);
      };
      req.onerror = () => resolve(null);
    } catch(e) { resolve(null); }
  });
}

async function idbSet(itemId, dataURL) {
  const db = await openIDB();
  if (!db) return;
  try {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put({ dataURL, version: CACHE_VERSION }, itemId);
  } catch(e) {}
}

renderCache.getAsync = async function(itemId) {
  if (_renderCache.has(itemId)) return _renderCache.get(itemId);
  const fromIDB = await idbGet(itemId);
  if (fromIDB) { _renderCache.set(itemId, fromIDB); return fromIDB; }
  return null;
};

renderCache.persist = async function(itemId, dataURL) {
  _renderCache.set(itemId, dataURL);
  await idbSet(itemId, dataURL);
};

// ========== RENDER PIPELINE ==========
function getAllItemIds() {
  const ids = new Set();
  for (const cat of Object.values(ITEM_DB)) {
    for (const item of cat.items) ids.add(item.id);
  }
  return [...ids];
}

const renderPipeline = {
  total: 0,
  done: 0,
  running: false,

  async start() {
    if (this.running || typeof THREE === "undefined") return;
    this.running = true;

    const allIds = getAllItemIds();
    this.total = allIds.length;
    this.done = 0;

    const toRender = [];
    for (const id of allIds) {
      const cached = await renderCache.getAsync(id);
      if (cached) { this.done++; continue; }
      toRender.push(id);
    }

    if (window._forceUpdate) window._forceUpdate();

    const BATCH = 5;
    for (let i = 0; i < toRender.length; i += BATCH) {
      const batch = toRender.slice(i, i + BATCH);
      for (const id of batch) {
        try {
          const dataURL = await renderItemTo3D(id);
          if (dataURL) await renderCache.persist(id, dataURL);
        } catch(e) {}
        this.done++;
      }
      if (window._forceUpdate) window._forceUpdate();
      await new Promise(r => setTimeout(r, 0));
    }

    this.running = false;
    if (window._forceUpdate) window._forceUpdate();
  }
};

// Auto-clear stale IDB cache on version change
(async()=>{
  try {
    const db = await openIDB();
    if (!db) return;
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get("__version__");
    req.onsuccess = async () => {
      const v = req.result;
      if (!v || v.version !== CACHE_VERSION) {
        const ctx = db.transaction(IDB_STORE, "readwrite");
        ctx.objectStore(IDB_STORE).clear();
        ctx.objectStore(IDB_STORE).put({ version: CACHE_VERSION }, "__version__");
        console.log("Render cache cleared (version " + CACHE_VERSION + ")");
      }
    };
  } catch(e) {}
})();

// ItemTexture: tries render/ → texmap → item/ → block/ → emoji
const RENDERS="assets/minecraft/renders/";
const POTION_LAYERS={
  potion:{base:`${TEX}item/potion.png`,overlay:`${TEX}item/potion_overlay.png`},
  splash_potion:{base:`${TEX}item/splash_potion.png`,overlay:`${TEX}item/potion_overlay.png`},
  lingering_potion:{base:`${TEX}item/lingering_potion.png`,overlay:`${TEX}item/potion_overlay.png`},
  tipped_arrow:{base:`${TEX}item/tipped_arrow_base.png`,overlay:`${TEX}item/tipped_arrow_head.png`},
};
function TintedTexture({itemId,color,size,className}){
  const canvasRef=useRef(null);const sz=size||"100%";
  useEffect(()=>{
    const layers=POTION_LAYERS[itemId];if(!layers)return;
    const cv=canvasRef.current;if(!cv)return;const ctx=cv.getContext("2d");
    const base=new Image();const over=new Image();
    base.crossOrigin="anonymous";over.crossOrigin="anonymous";
    let loaded=0;
    const draw=()=>{
      if(++loaded<2)return;
      cv.width=16;cv.height=16;ctx.imageSmoothingEnabled=false;
      // Draw overlay tinted with color
      ctx.clearRect(0,0,16,16);
      ctx.drawImage(over,0,0,16,16);
      // Tint: multiply overlay pixels with color
      const rgb=hexToRgb(color);
      const imgData=ctx.getImageData(0,0,16,16);const d=imgData.data;
      for(let i=0;i<d.length;i+=4){
        d[i]=Math.round(d[i]*rgb.r/255);
        d[i+1]=Math.round(d[i+1]*rgb.g/255);
        d[i+2]=Math.round(d[i+2]*rgb.b/255);
      }
      ctx.putImageData(imgData,0,0);
      // Draw base on top (composited normally)
      ctx.globalCompositeOperation="destination-over";
      ctx.drawImage(base,0,0,16,16);
      ctx.globalCompositeOperation="source-over";
    };
    base.onload=draw;over.onload=draw;
    base.src=layers.base;over.src=layers.overlay;
  },[itemId,color]);
  return <canvas ref={canvasRef} className={`itx ${className||""}`} style={{width:sz,height:sz,imageRendering:"pixelated"}} width={16} height={16}/>;
}
function SkullFace({url,size,className}){
  const canvasRef=useRef(null);const sz=size||"100%";
  const[ok,setOk]=useState(false);
  useEffect(()=>{
    const cv=canvasRef.current;if(!cv)return;const ctx=cv.getContext("2d");
    const img=new Image();img.crossOrigin="anonymous";
    img.onload=()=>{cv.width=8;cv.height=8;ctx.imageSmoothingEnabled=false;
      // MC skin: face at 8,8 size 8x8, hat overlay at 40,8
      ctx.drawImage(img,8,8,8,8,0,0,8,8);ctx.drawImage(img,40,8,8,8,0,0,8,8);setOk(true);};
    img.onerror=()=>setOk(false);
    img.src=url;
  },[url]);
  return <canvas ref={canvasRef} className={`itx ${className||""}`} style={{width:sz,height:sz,imageRendering:"pixelated",display:ok?"block":"none"}} width={8} height={8}/>;
}
function ItemTexture({itemId,size,className,potionColor,skullTexture}){
  const[stage,setStage]=useState(0);
  const sz=size||"100%";
  const cls=`itx ${className||""}`;
  const explicit=getTexPath(itemId);

  useEffect(()=>{setStage(0);},[itemId]);

  // Custom skull head
  if(skullTexture&&itemId==="player_head"){
    return <SkullFace url={skullTexture} size={sz} className={className}/>;
  }

  // Tinted potion/arrow rendering
  if(potionColor&&POTION_LAYERS[itemId]){
    return <TintedTexture itemId={itemId} color={potionColor} size={sz} className={className}/>;
  }

  const srcs=[
    `${RENDERS}${itemId}.png`,
    explicit,
    `${TEX}item/${itemId}.png`,
    `${TEX}block/${itemId}.png`,
  ].filter(Boolean);

  if(stage<srcs.length){
    return <img className={cls} src={srcs[stage]} style={{width:sz,height:sz}} alt="" draggable={false} onError={()=>setStage(stage+1)}/>;
  }
  return <span className={`itx-e ${className||""}`} style={{fontSize:typeof sz==='number'?sz*.55:16}}>{"❓"}</span>;
}

// Lore editor — always MiniMessage
function LoreEditor({lore,onChange}){
  const[mmText,setMmText]=useState(()=>lore.map(l=>seg2mm(l)).join("\n"));
  const[showTpls,setShowTpls]=useState(false);
  const tref=useRef(null);
  const loreRef=useRef(null);
  useEffect(()=>{if(!showTpls)return;const h=e=>{if(tref.current&&!tref.current.contains(e.target))setShowTpls(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[showTpls]);

  const lastApply=useRef(null);
  useEffect(()=>{if(lastApply.current!==lore)setMmText(lore.map(l=>seg2mm(l)).join("\n"));},[lore]);

  const applyMMLore=(text)=>{
    setMmText(text);
    const lines=text.split("\n");
    const parsed=lines.map(l=>{const p=parseMM(l);return p.length?p:[ds("","#AAAAAA")];});
    lastApply.current=parsed;
    onChange(parsed);
  };

  const insertAtCursor=(s)=>{
    const ta=loreRef.current;
    if(!ta){applyMMLore(mmText+s);return;}
    const start=ta.selectionStart,end=ta.selectionEnd;
    const nv=mmText.slice(0,start)+s+mmText.slice(end);
    applyMMLore(nv);
    setTimeout(()=>{ta.selectionStart=ta.selectionEnd=start+s.length;ta.focus();},0);
  };

  return(<div className="ed-s">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <div className="ed-st" style={{margin:0}}>LORE</div>

          {showTpls&&<div className="ldd" ref={tref} style={{bottom:"100%",right:0}}>{LORE_TPLS.map((t,i)=><div key={i} className="ldi" onClick={()=>{const tpl=seg2mm(t.s);applyMMLore(mmText+(mmText?"\n":"")+tpl);setShowTpls(false);}}>{t.l}</div>)}</div>}
        </div>
      </div>
    </div>
    <textarea className="mm-input" ref={loreRef} value={mmText} onChange={e=>applyMMLore(e.target.value)} placeholder={"<gray>Строка 1\n<yellow>Строка 2"} rows={Math.max(3,lore.length+1)}/>
    <div className="mm-help">{"Каждая строка = одна строка lore. MiniMessage теги работают."}</div>
    <div className="prev-box" style={{marginTop:4}}>

    </div>
  </div>);
}

// Color Picker Modal
function ColorPickerModal({onClose,onApply}){
  const[hue,setHue]=useState(0);const[sat,setSat]=useState(100);const[val,setVal]=useState(100);
  const[hex,setHex]=useState("#FF0000");const[copied,setCopied]=useState(false);
  const sqRef=useRef(null);const hueRef=useRef(null);
  const hsv2hex=(h,s,v)=>{s/=100;v/=100;const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;let r=0,g=0,b=0;
    if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
    return rgbToHex(Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255));};
  useEffect(()=>{setHex(hsv2hex(hue,sat,val));},[hue,sat,val]);
  useEffect(()=>{const c=sqRef.current;if(!c)return;const ctx=c.getContext("2d");const w=c.width,h=c.height;
    const base=hsv2hex(hue,100,100);const gh=ctx.createLinearGradient(0,0,w,0);gh.addColorStop(0,"#FFFFFF");gh.addColorStop(1,base);ctx.fillStyle=gh;ctx.fillRect(0,0,w,h);
    const gv=ctx.createLinearGradient(0,0,0,h);gv.addColorStop(0,"rgba(0,0,0,0)");gv.addColorStop(1,"#000000");ctx.fillStyle=gv;ctx.fillRect(0,0,w,h);},[hue]);
  useEffect(()=>{const c=hueRef.current;if(!c)return;const ctx=c.getContext("2d");
    const g=ctx.createLinearGradient(0,0,0,c.height);["#FF0000","#FFFF00","#00FF00","#00FFFF","#0000FF","#FF00FF","#FF0000"].forEach((c,i)=>g.addColorStop(i/6,c));
    ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);},[]);
  const drag=(ref,fn)=>e=>{const handle=ev=>{const r=ref.current.getBoundingClientRect();fn(Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width)),Math.max(0,Math.min(1,(ev.clientY-r.top)/r.height)));};
    handle(e);const up=()=>{window.removeEventListener("mousemove",handle);window.removeEventListener("mouseup",up);};window.addEventListener("mousemove",handle);window.addEventListener("mouseup",up);};
  const fromHex=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;let hh=0;if(d>0){if(mx===r)hh=60*(((g-b)/d)%6);else if(mx===g)hh=60*((b-r)/d+2);else hh=60*((r-g)/d+4);}
    if(hh<0)hh+=360;setHue(Math.round(hh));setSat(Math.round(mx?d/mx*100:0));setVal(Math.round(mx/255*100));setHex(h);};
  const copyHex=()=>{navigator.clipboard.writeText("<"+hex+">");setCopied(true);setTimeout(()=>setCopied(false),1500);};
  return(<div className="mo" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:420}}>
      <div className="md-t">{"Палитра цветов"}</div>
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        <div style={{position:"relative"}}><canvas ref={sqRef} width={200} height={200} style={{borderRadius:4,cursor:"crosshair"}} onMouseDown={drag(sqRef,(x,y)=>{setSat(Math.round(x*100));setVal(Math.round((1-y)*100));})}/>
          <div style={{position:"absolute",width:12,height:12,border:"2px solid #fff",borderRadius:"50%",boxShadow:"0 0 3px rgba(0,0,0,.5)",pointerEvents:"none",transform:"translate(-50%,-50%)",left:sat*2,top:(100-val)*2}}/></div>
        <div style={{position:"relative"}}><canvas ref={hueRef} width={20} height={200} style={{borderRadius:4,cursor:"pointer"}} onMouseDown={drag(hueRef,(_,y)=>{setHue(Math.round(y*360));})}/>
          <div style={{position:"absolute",width:24,height:6,border:"2px solid #fff",borderRadius:3,boxShadow:"0 0 3px rgba(0,0,0,.5)",pointerEvents:"none",left:-2,top:hue/360*200-3}}/></div>
        <div style={{display:"flex",flexDirection:"column",gap:8,flex:1}}>
          <div style={{width:"100%",height:48,borderRadius:4,border:"1px solid var(--bd)",background:hex}}/>
          <input value={hex} onChange={e=>{const v=e.target.value;setHex(v);if(/^#[0-9A-Fa-f]{6}$/.test(v))fromHex(v.toUpperCase());}} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13}}/>
          <button className="b bp" onClick={copyHex}>{copied?"Скопировано!":"Копировать <#>"}</button>
          {onApply&&<button className="b" onClick={()=>{onApply(hex);onClose();}}>{"Применить"}</button>}
        </div>
      </div>
      <div style={{marginTop:10}}>
        <div style={{fontSize:10,color:"var(--tx2)",marginBottom:4}}>{"MC ЦВЕТА"}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:3}}>
          {MC_COLORS.map((c,i)=><div key={i} style={{width:24,height:24,borderRadius:3,cursor:"pointer",background:c.h,border:"2px solid transparent"}} onClick={()=>fromHex(c.h)} title={c.m}/>)}
        </div>
      </div>
    </div>
  </div>);
}

function seg2amText(segs){if(!segs||!segs.length)return"";let r="";for(const s of segs){r+="<"+s.color+">";if(s.bold)r+="&l";if(s.italic)r+="&o";if(s.underlined)r+="&n";if(s.strikethrough)r+="&m";if(s.obfuscated)r+="&k";r+=s.text;}return r;}
function ExportModal({project,onClose}){
  const[tab,setTab]=useState("json");const[copied,setCopied]=useState(false);
  const[amCmd,setAmCmd]=useState(project.name.toLowerCase().replace(/[^a-z0-9]/g,"")||"menu");
  const[fmClass,setFmClass]=useState(project.name.replace(/[^a-zA-Z0-9]/g,"")+"GUI"||"PreviewGUI");
  const gen=()=>{const filled=[];for(let r=0;r<project.rows;r++)for(let c=0;c<9;c++){const k=`${r}-${c}`;const s=project.slots[k];if(s)filled.push({slot:r*9+c,...s});}
    if(tab==="json")return JSON.stringify({menu:{title:project.name,size:project.rows*9,rows:project.rows},slots:filled.map(s=>({slot:s.slot,material:s.itemId.toUpperCase(),displayName:{legacy:seg2leg(s.displayName),minimessage:seg2mm(s.displayName),segments:s.displayName},lore:{legacy:s.lore.map(l=>seg2leg(l)),minimessage:s.lore.map(l=>seg2mm(l)),segments:s.lore},amount:s.amount,enchanted:s.enchanted,customModelData:s.customModelData})),metadata:{exportedAt:new Date().toISOString(),tool:"MC Menu Designer v3.0",totalSlots:project.rows*9,filledSlots:filled.length}},null,2);
    if(tab==="yaml"){let y=`title: "${seg2leg([ds(project.name,"#FFFFFF")])}"\nsize: ${project.rows*9}\nitems:\n`;for(const s of filled){y+=`  '${s.slot}':\n    material: ${s.itemId.toUpperCase()}\n    name: "${seg2leg(s.displayName)}"\n`;if(s.lore.length){y+=`    lore:\n`;for(const l of s.lore)y+=`      - "${seg2leg(l)}"\n`;}y+=`    amount: ${s.amount}\n`;if(s.enchanted)y+=`    enchanted: true\n`;}return y;}

function GradientModal({onApply,onClose}){
  const[text,setText]=useState("Пример текста");

  const[bold,setBold]=useState(false);

  const addColor=()=>setColors([...colors,"#FFFFFF"]);
  const rmColor=i=>{if(colors.length<=2)return;setColors(colors.filter((_,j)=>j!==i));};
  const setColor=(i,c)=>setColors(colors.map((v,j)=>j===i?c:v));
  // Generate gradient segments
  const genSegs=()=>{
    if(!text)return[];
    const segs=[];const len=text.length;const totalS=colors.length-1;
    for(let i=0;i<len;i++){
      const t=len===1?0:i/(len-1);
      const si=Math.min(Math.floor(t*totalS),totalS-1);
      const st=(t*totalS)-si;
      const c1=hexToRgb(colors[si]),c2=hexToRgb(colors[si+1]);
      const hex=rgbToHex(Math.round(c1.r+(c2.r-c1.r)*st),Math.round(c1.g+(c2.g-c1.g)*st),Math.round(c1.b+(c2.b-c1.b)*st));
      segs.push({text:text[i],color:hex,bold,italic,underlined:false,strikethrough:false,obfuscated:false});
    }
    return segs;
  };
  const segs=genSegs();
  const mm=seg2mm(segs);
  const gradTag=`<gradient:${colors.join(':')}>${bold?"<bold>":""}${italic?"<italic>":""}${text}${italic?"</italic>":""}${bold?"</bold>":""}</gradient>`;
  const[copied,setCopied]=useState("");
  const copy=(t,label)=>{navigator.clipboard.writeText(t).then(()=>{setCopied(label);setTimeout(()=>setCopied(""),1500);});};
  return(<div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{minWidth:520}}>
    <div className="md-t">{"Градиент-генератор"}</div>
    <div className="ed-s">
      <div className="ed-st">{"Пресеты"}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{GRAD_PRESETS.map((p,i)=><button key={i} className="b" style={{background:`linear-gradient(90deg,${p.colors.join(",")})`,color:"#fff",textShadow:"0 1px 2px #000",fontSize:10,padding:"3px 8px"}} onClick={()=>{setColors([...p.colors]);setText(p.text);}}>{p.name}</button>)}</div>
    </div>
    <div className="ed-s">
      <div className="ed-st">{"Текст"}</div>
      <input value={text} onChange={e=>setText(e.target.value)} style={{width:"100%",padding:"8px 12px",fontSize:14,borderRadius:"var(--r8)"}} placeholder={"Введите текст..."}/>
    </div>
    <div className="ed-s">
      <div className="ed-st">{"Цвета"}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        {colors.map((c,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:3}}>
          <input type="color" value={c} onChange={e=>setColor(i,e.target.value)} style={{width:36,height:36,border:"2px solid var(--bd)",borderRadius:"var(--r8)",padding:0,cursor:"pointer",background:"none"}}/>
          <input value={c} onChange={e=>setColor(i,e.target.value)} style={{width:76,fontFamily:"'JetBrains Mono',monospace",fontSize:11,textAlign:"center"}}/>
          {colors.length>2&&<button className="b bd" style={{padding:"2px 6px"}} onClick={()=>rmColor(i)}>{"×"}</button>}
        </div>))}
        <button className="b" onClick={addColor}>+</button>
      </div>
    </div>
    <div className="ed-s">
      <div className="ed-st">{"Формат"}</div>
      <div style={{display:"flex",gap:6}}>
        <button className={"b"+(bold?" bp":"")} onClick={()=>setBold(!bold)} style={{fontWeight:700}}>B</button>
        <button className={"b"+(italic?" bp":"")} onClick={()=>setItalic(!italic)} style={{fontStyle:"italic"}}>I</button>
      </div>
    </div>
    <div className="ed-s">
      <div className="ed-st">{"Превью"}</div>
      <div className="prev-box" style={{padding:"10px 14px"}}><div className="line" style={{fontSize:18}}><McText segs={segs}/></div></div>
    </div>
    <div className="ed-s">
      <div className="ed-st">MiniMessage</div>
      <div style={{display:"flex",gap:6}}>
        <div className="md-code" style={{flex:1,fontSize:11,padding:"8px 10px",maxHeight:80}}>{gradTag}</div>
        <button className="b" onClick={()=>copy(gradTag,"mm")}>{copied==="mm"?"✓":"Коп."}</button>
      </div>
    </div>
    <div className="ed-s">
      <div className="ed-st">{"\u00A7-коды"}</div>
      <div style={{display:"flex",gap:6}}>
        <div className="md-code" style={{flex:1,fontSize:11,padding:"8px 10px",maxHeight:80}}>{seg2leg(segs)}</div>
        <button className="b" onClick={()=>copy(seg2leg(segs),"leg")}>{copied==="leg"?"✓":"Коп."}</button>
      </div>
    </div>

      {onApply&&<button className="b bp" onClick={()=>{onApply(parseMM(gradTag));onClose();}}>{"Применить к имени"}</button>}
      <button className="b" onClick={onClose}>{"Закрыть"}</button>
